services:
  # ─── Storage Layer ───────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: irh-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_pass
      POSTGRES_DB: trade_hub
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trade_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: irh-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend Services ────────────────────────────────────
  datastream:
    build:
      context: .
      dockerfile: services/datastream/Dockerfile
    container_name: irh-datastream
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  trading:
    build:
      context: .
      dockerfile: services/trading/Dockerfile
    container_name: irh-trading
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  data-worker:
    build:
      context: .
      dockerfile: services/data-worker/Dockerfile
    container_name: irh-data-worker
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web-api:
    build:
      context: .
      dockerfile: services/web-api/Dockerfile
    container_name: irh-web-api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Experiment Layer ────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: irh-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://trader:trader_pass@timescaledb:5432/trade_hub
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install --quiet psycopg2-binary &&
        mlflow server
          --backend-store-uri postgresql://trader:trader_pass@timescaledb:5432/trade_hub
          --default-artifact-root /mlflow/artifacts
          --host 0.0.0.0
          --port 5000
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  experiment:
    build:
      context: .
      dockerfile: services/experiment/Dockerfile
    container_name: irh-experiment
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: irh-frontend
    ports:
      - "3000:3000"
    depends_on:
      - web-api
    environment:
      - VITE_WS_URL=ws://localhost:8000/ws
      - VITE_API_URL=http://localhost:8000
      - VITE_MLFLOW_URL=http://localhost:5000

volumes:
  timescale_data:
  redis_data:
  mlflow_artifacts:
